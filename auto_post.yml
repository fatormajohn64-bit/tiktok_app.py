name: Daily TikTok AI Poster

# This is the "Clock". It runs every day at 12:00 UTC.
on:
  schedule:
    - cron: '0 12 * * *' 
  workflow_dispatch: # Allows you to trigger it manually from GitHub

jobs:
  run-ai-factory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: |
          pip install -r requirements.txt
          
      - name: Run Background AI Script
        env:
          # This grabs the key from your GitHub secrets securely
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Tells the code to run in headless mode without Streamlit
          python app.py 
