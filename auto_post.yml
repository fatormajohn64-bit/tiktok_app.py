name: Daily TikTok Post
on:
  schedule:
    - cron: '0 12 * * *' # Runs daily at 12:00 PM UTC
jobs:
  run-factory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pip install -r requirements.txt
          python app.py
